services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      CORE_SERVICE_URL: http://core-service:8081
      BILLING_SERVICE_URL: http://billing-service:8082
      OPS_SERVICE_URL: http://ops-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - core-service
      - billing-service
      - ops-service

  core-service:
    build:
      context: .
      dockerfile: services/core-service/Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

  ops-service:
    build:
      context: .
      dockerfile: services/ops-service/Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8083
    ports:
      - "8083:8083"

